<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passport Size Photo Studio</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#4f46e5', secondary: '#1e293b' }
                }
            }
        }
    </script>
    
    <!-- Cropper.js (For manual cropping) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Imgly AI Background Removal -->
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/imglyRemoveBackground.umd.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* PRINT CSS - EXACT A4 SIZE */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body * { visibility: hidden; }
            .no-print { display: none !important; }
            body { background: #ffffff !important; margin: 0 !important; padding: 0 !important; }
            #passport-print-area, #passport-print-area * { visibility: visible !important; }
            
            #passport-print-area {
                box-sizing: border-box !important; position: absolute !important; 
                left: 0 !important; top: 0 !important; width: 210mm !important; 
                height: 297mm !important; margin: 0 !important;
                padding-left: 12mm !important; padding-right: 12mm !important; padding-bottom: 12mm !important; 
                background: #ffffff !important; display: flex !important; flex-wrap: wrap !important; align-content: flex-start !important;
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
            }
            .passport-img-box { box-sizing: border-box; border: 1px dashed #cbd5e1; }
        }

        /* A4 PREVIEW SCREEN */
        #preview-wrapper {
            width: 100%; max-width: 520px; aspect-ratio: 210 / 297;
            background: white; overflow: hidden; position: relative; margin: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0;
        }
        #passport-print-area {
            width: 100%; height: 100%; display: flex; flex-wrap: wrap;
            align-content: flex-start; box-sizing: border-box; padding: 4%;
        }
        .passport-img-box { overflow: hidden; position: relative; }
        
        .drag-active { border-color: #4f46e5 !important; background-color: #eef2ff !important; }
        
        /* Cropper Modal Image Area */
        #cropper-img-container { max-height: 60vh; }
        #cropper-image { display: block; max-width: 100%; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- OVERLAY 1: Cropping Modal -->
    <div id="crop-modal" class="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-[60] hidden no-print backdrop-blur-md">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl p-6 m-4 flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b pb-3">
                <h2 class="text-xl font-bold text-slate-800">Crop Photo</h2>
                <button onclick="closeCropModal()" class="text-slate-400 hover:text-red-500 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="cropper-img-container" class="bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center w-full mb-4">
                <img id="cropper-image" src="" alt="To Crop">
            </div>
            <p class="text-sm text-slate-500 mb-4 text-center">Adjust the box to frame the face properly.</p>
            <div class="flex justify-end gap-3 border-t pt-4">
                <button onclick="closeCropModal()" class="px-5 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 font-medium transition">Cancel</button>
                <button onclick="applyCrop()" class="px-5 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 font-medium transition shadow-md">Crop & Remove BG ✨</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY 2: Processing AI Image -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-[70] hidden no-print">
        <svg class="animate-spin h-12 w-12 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-white text-2xl font-bold tracking-tight">Processing Image...</h2>
        <p class="text-indigo-200 text-sm mt-2 font-medium">Removing background and applying studio settings</p>
    </div>

    <!-- TOP NAVBAR -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center px-6 shrink-0 no-print z-10 shadow-sm">
        <div class="flex items-center gap-3 w-full max-w-7xl mx-auto">
            <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Passport Size Photo Studio</h1>
        </div>
    </header>

    <!-- MAIN DASHBOARD -->
    <main class="flex-1 flex overflow-hidden no-print">
        
        <!-- LEFT PANEL: SETTINGS -->
        <aside class="w-full lg:w-[450px] bg-white border-r border-slate-200 flex flex-col h-full z-10 shadow-xl overflow-y-auto">
            <div class="p-6 space-y-6 flex-1">
                
                <!-- 1. Upload Section -->
                <section>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">1. Subject Setup</h3>
                    <label id="dropZone" class="relative flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-2 text-indigo-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            <p class="text-sm font-semibold text-slate-700">Upload & Crop Photo</p>
                        </div>
                        <input id="imageInput" type="file" class="hidden" accept="image/*" />
                    </label>
                </section>

                <!-- 2. Photo Count Controls (Dropdown + Buttons) -->
                <section class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">2. Quantity to Print</h3>
                    <div class="flex gap-4">
                        <!-- Dropdown -->
                        <div class="flex-1">
                            <select id="countDropdown" class="w-full bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-indigo-500 block p-2.5 outline-none font-medium">
                                <option value="2">2 Photos</option>
                                <option value="4">4 Photos</option>
                                <option value="6" selected>6 Photos (Recommended)</option>
                                <option value="8">8 Photos</option>
                                <option value="12">12 Photos</option>
                                <option value="24">24 Photos</option>
                            </select>
                        </div>
                        <!-- Plus/Minus Buttons -->
                        <div class="flex items-center bg-white border border-slate-300 rounded-lg overflow-hidden h-[42px]">
                            <button onclick="changeCount(-1)" class="w-10 h-full flex items-center justify-center text-slate-600 hover:bg-slate-100 transition font-bold text-xl border-r border-slate-300">-</button>
                            <input type="number" id="passportCount" value="6" class="w-14 h-full text-center text-sm font-bold text-slate-800 outline-none p-0 border-none pointer-events-none">
                            <button onclick="changeCount(1)" class="w-10 h-full flex items-center justify-center text-slate-600 hover:bg-slate-100 transition font-bold text-xl border-l border-slate-300">+</button>
                        </div>
                    </div>
                </section>

                <!-- 3. Studio Background Colors -->
                <section>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">3. Background Color</h3>
                    <div class="flex items-center gap-3">
                        <button class="w-10 h-10 rounded-full border border-slate-200 shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #3b82f6;" onclick="setColor('#3b82f6')"></button>
                        <button class="w-10 h-10 rounded-full border border-slate-200 shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #ffffff;" onclick="setColor('#ffffff')"></button>
                        <button class="w-10 h-10 rounded-full border border-slate-200 shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #ef4444;" onclick="setColor('#ef4444')"></button>
                        <button class="w-10 h-10 rounded-full border border-slate-200 shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #94a3b8;" onclick="setColor('#94a3b8')"></button>
                        <div class="h-6 w-px bg-slate-300 mx-1"></div>
                        <div class="relative w-10 h-10 rounded-full overflow-hidden border border-slate-200 shadow-sm cursor-pointer hover:scale-105 transition">
                            <input type="color" id="bgColor" value="#3b82f6" class="absolute inset-0 w-[200%] h-[200%] -top-2 -left-2 cursor-pointer">
                        </div>
                    </div>
                </section>

                <!-- 4. Dimensions & Grid -->
                <section class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">4. Size & Layout</h3>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Photo Width (mm)</label>
                        <input type="number" id="photoWidth" value="35" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Photo Height (mm)</label>
                        <input type="number" id="photoHeight" value="45" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Columns per row</label>
                        <input type="number" id="passportCols" value="3" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Grid Gap (mm)</label>
                        <input type="number" id="passportGap" value="5" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Top Margin (mm)</label>
                        <input type="number" id="topMargin" value="15" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm outline-none">
                    </div>
                </section>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="p-5 border-t border-slate-200 bg-slate-50 space-y-3">
                <button onclick="downloadPassportSheet()" id="downloadBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download A4 Sheet (JPG)
                </button>
                <button onclick="window.print()" class="w-full bg-white hover:bg-slate-100 text-slate-800 border-2 border-slate-200 font-bold py-3.5 px-4 rounded-xl shadow-sm transition flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Print Directly
                </button>
            </div>
        </aside>

        <!-- RIGHT PANEL: LIVE PREVIEW -->
        <section class="flex-1 bg-slate-200 flex flex-col p-8 overflow-y-auto no-print relative">
            <!-- A4 Paper Representation -->
            <div id="preview-wrapper" class="rounded-sm flex-shrink-0">
                <div id="passport-print-area">
                    <!-- Empty State -->
                    <div class="w-full h-full flex flex-col items-center justify-center text-slate-400">
                        <div class="bg-slate-100 p-4 rounded-full mb-3 shadow-inner">
                            <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <span class="font-medium">Upload photo to view A4 layout</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Application Script -->
    <script>
        let activeImageUrl = null;
        let cropper = null;

        // Elements
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const bgColorInput = document.getElementById('bgColor');
        const printArea = document.getElementById('passport-print-area');
        
        // Modal Elements
        const cropModal = document.getElementById('crop-modal');
        const cropperImage = document.getElementById('cropper-image');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        // Count Elements
        const countInput = document.getElementById('passportCount');
        const countDropdown = document.getElementById('countDropdown');

        // Color Swatch
        window.setColor = function(color) {
            bgColorInput.value = color;
            updatePreview();
        };

        // --- QUANTITY CONTROLS LOGIC ---
        // Change via Dropdown
        countDropdown.addEventListener('change', (e) => {
            countInput.value = e.target.value;
            updatePreview();
        });

        // Change via Plus/Minus Buttons
        window.changeCount = function(amount) {
            let current = parseInt(countInput.value) || 0;
            let newVal = current + amount;
            if (newVal < 1) newVal = 1;
            
            countInput.value = newVal;
            
            // Sync dropdown if value exists, otherwise reset dropdown visual
            let optionExists = Array.from(countDropdown.options).some(opt => opt.value == newVal);
            if(optionExists) {
                countDropdown.value = newVal;
            } else {
                countDropdown.selectedIndex = -1; // Deselect
            }
            updatePreview();
        };


        // --- DRAG, DROP & UPLOAD ---
        imageInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) initCrop(e.target.files[0]);
        });
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) initCrop(e.dataTransfer.files[0]);
        });

        // --- CROPPER INIT ---
        function initCrop(file) {
            if (!file.type.startsWith('image/')) return;
            
            const url = URL.createObjectURL(file);
            cropperImage.src = url;
            cropModal.classList.remove('hidden');

            // Calculate expected aspect ratio for passport
            const w = parseFloat(document.getElementById('photoWidth').value) || 35;
            const h = parseFloat(document.getElementById('photoHeight').value) || 45;
            
            if (cropper) cropper.destroy();
            
            cropper = new Cropper(cropperImage, {
                aspectRatio: w / h,
                viewMode: 1,
                autoCropArea: 0.8,
                background: false
            });
            
            imageInput.value = ""; // Reset input
        }

        function closeCropModal() {
            cropModal.classList.add('hidden');
            if(cropper) cropper.destroy();
        }

        // --- APPLY CROP & REMOVE BACKGROUND ---
        async function applyCrop() {
            if(!cropper) return;
            
            // 1. Get cropped image as Blob
            const croppedCanvas = cropper.getCroppedCanvas({
                width: 600, // standard processing size
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });
            
            closeCropModal();
            loadingOverlay.classList.remove('hidden');

            croppedCanvas.toBlob(async (blob) => {
                try {
                    // 2. Pass cropped blob to Imgly AI Background Removal
                    const transparentBlob = await imglyRemoveBackground(blob, {
                        publicPath: 'https://unpkg.com/@imgly/background-removal@1.4.3/dist/assets/' 
                    });
                    
                    if (activeImageUrl) URL.revokeObjectURL(activeImageUrl);
                    activeImageUrl = URL.createObjectURL(transparentBlob);
                    
                    updatePreview();
                } catch (error) {
                    console.error("AI Error:", error);
                    alert("Failed to remove background. Please try another image.");
                } finally {
                    loadingOverlay.classList.add('hidden');
                }
            }, 'image/png');
        }

        // Live Update Setup
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', updatePreview);
        });
        bgColorInput.addEventListener('input', updatePreview);

        // --- PREVIEW RENDERER ---
        function updatePreview() {
            if (!activeImageUrl) return;

            const w = document.getElementById('photoWidth').value;
            const h = document.getElementById('photoHeight').value;
            const count = parseInt(countInput.value) || 6; // Uses unified count input
            const top = document.getElementById('topMargin').value;
            const gap = document.getElementById('passportGap').value;
            const color = bgColorInput.value;

            printArea.style.setProperty('padding-top', `${top}mm`, 'important');
            printArea.style.setProperty('gap', `${gap}mm`, 'important');
            printArea.innerHTML = ''; 

            for (let i = 0; i < count; i++) {
                const box = document.createElement('div');
                box.className = 'passport-img-box';
                box.style.width = `${w}mm`;
                box.style.height = `${h}mm`;
                box.style.backgroundColor = color;
                
                const img = document.createElement('img');
                img.src = activeImageUrl;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';

                box.appendChild(img);
                printArea.appendChild(box);
            }
        }

        const loadImage = (url) => new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => res(img);
            img.onerror = rej;
            img.src = url;
        });

        // --- EXPORT 300 DPI SHEET ---
        async function downloadPassportSheet() {
            if (!activeImageUrl) return alert("Please upload and crop a photo first.");

            const btn = document.getElementById('downloadBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...`;
            btn.disabled = true;

            try {
                const w = parseFloat(document.getElementById('photoWidth').value);
                const h = parseFloat(document.getElementById('photoHeight').value);
                const cols = parseInt(document.getElementById('passportCols').value);
                const count = parseInt(countInput.value);
                const topM = parseFloat(document.getElementById('topMargin').value);
                const gap = parseFloat(document.getElementById('passportGap').value);
                const bgColor = bgColorInput.value;

                // A4 Canvas at 300 DPI
                const canvas = document.createElement('canvas');
                canvas.width = 2480; 
                canvas.height = 3508;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const pxPerMm = 11.811;
                const padLeftPx = 12 * pxPerMm;
                const gapPx = gap * pxPerMm;
                const cwPx = w * pxPerMm;
                const chPx = h * pxPerMm;

                const img = await loadImage(activeImageUrl);
                let col = 0, row = 0;
                const startY = topM * pxPerMm;

                for (let i = 0; i < count; i++) {
                    if (col >= cols) { col = 0; row++; }
                    const x = padLeftPx + col * (cwPx + gapPx);
                    const y = startY + row * (chPx + gapPx);

                    ctx.fillStyle = bgColor;
                    ctx.fillRect(x, y, cwPx, chPx);
                    
                    ctx.drawImage(img, x, y, cwPx, chPx); // Image is already perfectly cropped!

                    // Cut lines
                    ctx.strokeStyle = '#9ca3af';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([10, 10]);
                    ctx.strokeRect(x, y, cwPx, chPx);
                    ctx.setLineDash([]);

                    col++;
                }

                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Passport-Studio-${Date.now()}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/jpeg', 0.98);

            } catch (err) {
                console.error("Export Error:", err);
                alert("Error exporting image.");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
