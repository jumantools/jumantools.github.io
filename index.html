<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Juman - Secure Admin Panel</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      }
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .secure-card { max-width: 550px; width: 100%; background: #1e293b; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #334155; }
    h2 { color: #38bdf8; text-align: center; margin-top: 0; font-size: 24px; letter-spacing: 0.5px; }
    h2 span { color: #ef4444; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
    input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #475569; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #0f172a; color: #fff; transition: 0.3s; }
    input:focus, textarea:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
    textarea { height: 120px; resize: vertical; }
    .code-box { font-family: 'Courier New', monospace; color: #34d399; background: #020617; }
    button { background: #38bdf8; color: #0f172a; border: none; padding: 14px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    button:hover { background: #0ea5e9; }
    .logout-btn { background: #ef4444; color: white; margin-top: 20px; }
    .logout-btn:hover { background: #dc2626; }
    .msg { margin-top: 20px; padding: 12px; text-align: center; font-weight: bold; border-radius: 8px; display: none; }
    #loginSection { display: block; }
    #dashboardSection { display: none; }
    #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
  </style>
</head>
<body>

<div class="secure-card">
  <div id="loginSection">
    <h2>Technical Juman <span>- Secure Lock</span></h2>
    <p style="text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 25px;">केवल अधिकृत एडमिन ही लॉगिन कर सकते हैं।</p>
    
    <div class="form-group" id="phoneGroup">
      <label>अपना एडमिन मोबाइल नंबर डालें (+91 के साथ):</label>
      <input type="tel" id="adminPhone" placeholder="जैसे: +9199XXXXXXXX">
    </div>
    
    <div class="form-group" id="otpGroup" style="display: none;">
      <label>आपके फोन पर भेजा गया 6-अंकों का OTP डालें:</label>
      <input type="number" id="otpCode" placeholder="Enter 6 Digit OTP">
    </div>

    <div id="recaptcha-container"></div>

    <button id="actionBtn">सुरक्षित लिंक भेजें (Send OTP)</button>
  </div>

  <div id="dashboardSection">
    <h2>Technical Juman <span>- Main Control Panel</span></h2>
    
    <div class="form-group">
      <label>टूल का नाम (Tool Name):</label>
      <input type="text" id="tName" placeholder="जैसे: Smart Photo Shop">
    </div>
    
    <div class="form-group">
      <label>टूल का छोटा विवरण (Description):</label>
      <textarea id="tDesc" placeholder="टूल के बारे में यूज़र्स के लिए जानकारी..."></textarea>
    </div>
    
    <div class="form-group">
      <label>टूल का पूरा HTML/JS कोड (Tool Code):</label>
      <textarea id="tCode" class="code-box" placeholder="यहाँ टूल का पूरा कोड पेस्ट करें..."></textarea>
    </div>
    
    <button id="uploadBtn">टूल को सीधे फायरबेस में लाइव करें</button>
    <button id="logoutBtn" class="logout-btn">पैनल लॉक करें (Logout)</button>
  </div>

  <div id="statusAlert" class="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "firebase/auth";
  import { getFirestore, collection, addDoc } from "firebase/firestore";

  // जुमन भाई का ओरिजिनल फायरबेस कॉन्फ़िगरेशन
  const firebaseConfig = {
    apiKey: "AIzaSyCvQtZF8m4AmlFpkb_8UcS2hXqW_27ZYQc",
    authDomain: "technicaljumantools.firebaseapp.com",
    projectId: "technicaljumantools",
    storageBucket: "technicaljumantools.firebasestorage.app",
    messagingSenderId: "413368590162",
    appId: "1:413368590162:web:68892ff8436ba8fc9d248b",
    measurementId: "G-HQ7HK1SDVF"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // सुरक्षा कवच: केवल जुमन भाई का नंबर ही अंदर जा पाएगा
  const ALLOWED_ADMIN_NUMBER = "+917762862822"; // <--- यहाँ अपना असली मोबाइल नंबर बदलें (जैसे: +919572xxxxxx)

  let confirmationResult = null;
  const alertBox = document.getElementById('statusAlert');

  function showAlert(text, type) {
    alertBox.style.display = "block";
    if(type === 'error') {
      alertBox.style.background = "#7f1d1d"; alertBox.style.color = "#fca5a5";
    } else if(type === 'wait') {
      alertBox.style.background = "#78350f"; alertBox.style.color = "#fde047";
    } else {
      alertBox.style.background = "#064e3b"; alertBox.style.color = "#6ee7b7";
    }
    alertBox.innerText = text;
  }

  // Google Invisible Recaptcha (ताकि बोट अटैक न कर सकें)
  window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    'size': 'normal',
    'callback': (response) => {}
  });

  const actionBtn = document.getElementById('actionBtn');

  actionBtn.addEventListener('click', async () => {
    const phoneInput = document.getElementById('adminPhone').value.trim();
    
    if (!confirmationResult) {
      // सुरक्षा जांच: क्या नंबर मैच हो रहा है?
      if (phoneInput !== ALLOWED_ADMIN_NUMBER) {
        showAlert("अस्वीकार किया गया: यह मोबाइल नंबर एडमिन डेटाबेस में नहीं है!", "error");
        return;
      }

      showAlert("गूगल सुरक्षा जांच जारी है, कृपया रुकें...", "wait");
      try {
        const appVerifier = window.recaptchaVerifier;
        confirmationResult = await signInWithPhoneNumber(auth, phoneInput, appVerifier);
        document.getElementById('phoneGroup').style.display = "none";
        document.getElementById('otpGroup').style.display = "block";
        document.getElementById('recaptcha-container').style.display = "none";
        actionBtn.innerText = "ओटीपी वेरिफाई करें (Verify OTP)";
        showAlert("सफलता! आपके फ़ोन पर असली OTP भेज दिया गया है।", "success");
      } catch (error) {
        showAlert("ओटीपी भेजने में एरर: " + error.message, "error");
        console.error(error);
      }
    } else {
      // OTP वेरिफिकेशन स्टेप
      const code = document.getElementById('otpCode').value.trim();
      showAlert("ओटीपी की जांच हो रही है...", "wait");
      try {
        const result = await confirmationResult.confirm(code);
        // लॉगिन सफल!
        document.getElementById('loginSection').style.display = "none";
        document.getElementById('dashboardSection').style.display = "block";
        alertBox.style.display = "none";
      } catch (error) {
        showAlert("गलत OTP! कृपया दोबारा सही कोड डालें।", "error");
      }
    }
  });

  // टूल डेटा सीधे फायरबेस में भेजने का सिस्टम
  document.getElementById('uploadBtn').addEventListener('click', async () => {
    const name = document.getElementById('tName').value.trim();
    const desc = document.getElementById('tDesc').value.trim();
    const code = document.getElementById('tCode').value.trim();

    if(!name || !desc || !code) {
      showAlert("डेटा सुरक्षित नहीं: कृपया सभी बॉक्स को पूरा भरें!", "error");
      return;
    }

    showAlert("फायरबेस एन्क्रिप्शन चालू है, डेटा भेजा जा रहा है...", "wait");

    try {
      await addDoc(collection(db, "tools"), {
        toolName: name,
        description: desc,
        toolCode: code,
        dateAdded: new Date().toISOString()
      });
      showAlert("बधाई हो जुमन भाई! नया टूल फायरबेस सिक्योर कलेक्शन में लाइव हो गया है।", "success");
      document.getElementById('tName').value = "";
      document.getElementById('tDesc').value = "";
      document.getElementById('tCode').value = "";
    } catch (e) {
      showAlert("डेटाबेस एरर: " + e.message, "error");
    }
  });

  // लॉगआउट (पैनल तुरंत लॉक करने के लिए)
  document.getElementById('logoutBtn').addEventListener('click', () => {
    auth.signOut();
    location.reload();
  });
</script>

</body>
</html>
