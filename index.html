<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passport Size Photo Studio</title>
    
    <!-- Google Fonts: Inter for Professional Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#4f46e5', secondary: '#1e293b' }
                }
            }
        }
    </script>
    
    <!-- Imgly AI Background Removal -->
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/imglyRemoveBackground.umd.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Custom Scrollbar for Settings Panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- PRINT CSS (CRITICAL FOR A4 EXACT SIZE) --- */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body * { visibility: hidden; }
            .no-print { display: none !important; }
            body { background: #ffffff !important; margin: 0 !important; padding: 0 !important; }
            #passport-print-area, #passport-print-area * { visibility: visible !important; }
            
            #passport-print-area {
                box-sizing: border-box !important; position: absolute !important; 
                left: 0 !important; top: 0 !important; width: 210mm !important; 
                height: 297mm !important; margin: 0 !important;
                padding-left: 12mm !important; padding-right: 12mm !important; 
                padding-bottom: 12mm !important; background: #ffffff !important; 
                display: flex !important; flex-wrap: wrap !important; 
                align-content: flex-start !important;
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
            }
            .passport-img-box { box-sizing: border-box; border: 1px dashed #cbd5e1; overflow: hidden; position: relative; }
        }

        /* --- A4 PAPER PREVIEW CSS --- */
        #preview-wrapper {
            width: 100%; max-width: 520px; aspect-ratio: 210 / 297;
            background: white; overflow: hidden; position: relative; margin: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #e5e7eb;
        }
        #passport-print-area {
            width: 100%; height: 100%; display: flex; flex-wrap: wrap;
            align-content: flex-start; box-sizing: border-box; padding: 4%;
        }
        .passport-img-box { overflow: hidden; position: relative; }
        
        /* Drag & Drop Overlay */
        .drag-active { border-color: #4f46e5 !important; background-color: #eef2ff !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- OVERLAY: Processing Image -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-50 hidden no-print transition-all">
        <!-- SVG Spinner -->
        <svg class="animate-spin h-12 w-12 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-white text-2xl font-bold tracking-tight">Processing Image...</h2>
        <p class="text-indigo-200 text-sm mt-2 font-medium">Removing background and applying studio settings</p>
    </div>

    <!-- TOP NAVBAR -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shrink-0 no-print z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Passport Photo Studio</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">A4 Canvas</span>
        </div>
    </header>

    <!-- MAIN DASHBOARD AREA -->
    <main class="flex-1 flex overflow-hidden no-print relative">
        
        <!-- LEFT PANEL: TOOLS & SETTINGS -->
        <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 flex flex-col h-full z-10 shadow-lg lg:shadow-none overflow-y-auto">
            <div class="p-6 space-y-8 flex-1">
                
                <!-- 1. Upload Section (Drag & Drop) -->
                <section>
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider">1. Photo Subject</h3>
                    </div>
                    <label id="dropZone" class="relative flex flex-col items-center justify-center w-full h-40 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-3 text-indigo-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="mb-1 text-sm font-semibold text-slate-700">Click to upload or drag & drop</p>
                            <p class="text-xs text-slate-500">Auto background removal applied</p>
                        </div>
                        <input id="imageInput" type="file" class="hidden" accept="image/*" />
                    </label>
                </section>

                <!-- 2. Studio Background -->
                <section>
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-3">2. Background Color</h3>
                    <div class="flex items-center gap-3">
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-200 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #3b82f6;" onclick="setColor('#3b82f6')"></button>
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-200 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #ffffff;" onclick="setColor('#ffffff')"></button>
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-200 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #ef4444;" onclick="setColor('#ef4444')"></button>
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-200 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 hover:scale-105 transition" style="background-color: #94a3b8;" onclick="setColor('#94a3b8')"></button>
                        <div class="h-6 w-px bg-slate-300 mx-1"></div>
                        <div class="relative w-10 h-10 rounded-full overflow-hidden border border-slate-200 shadow-sm cursor-pointer hover:scale-105 transition">
                            <input type="color" id="bgColor" value="#3b82f6" class="absolute inset-0 w-[200%] h-[200%] -top-2 -left-2 cursor-pointer">
                        </div>
                    </div>
                </section>

                <!-- 3. Size Specifications -->
                <section class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-3">3. Dimensions & Layout</h3>
                    
                    <select id="sizePreset" class="w-full bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 mb-4 font-medium shadow-sm outline-none">
                        <option value="35,45,4,8">🇮🇳 Standard India (35x45 mm) - 8 Photos</option>
                        <option value="51,51,3,6">🇺🇸 US Visa/Passport (51x51 mm) - 6 Photos</option>
                        <option value="35,45,4,8">🇬🇧 Standard UK (35x45 mm) - 8 Photos</option>
                        <option value="20,25,6,18">📮 Stamp Size (20x25 mm) - 18 Photos</option>
                        <option value="custom">⚙️ Custom Manual Size</option>
                    </select>

                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Width (mm)</label>
                            <input type="number" id="photoWidth" value="35" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Height (mm)</label>
                            <input type="number" id="photoHeight" value="45" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Columns</label>
                            <input type="number" id="passportCols" value="4" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Total Photos</label>
                            <input type="number" id="passportCount" value="8" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Top Margin (mm)</label>
                            <input type="number" id="topMargin" value="12" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Gap Between (mm)</label>
                            <input type="number" id="passportGap" value="5" class="w-full border border-slate-300 px-3 py-2 rounded-lg bg-white text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Footer Actions (Sticky Bottom) -->
            <div class="p-6 border-t border-slate-200 bg-white space-y-3">
                <button onclick="downloadPassportSheet()" id="downloadBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download High-Res JPG
                </button>
                <button onclick="window.print()" class="w-full bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 font-semibold py-3 px-4 rounded-xl shadow-sm transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Print Direct to A4
                </button>
            </div>
        </aside>

        <!-- RIGHT PANEL: PREVIEW CANVAS -->
        <section class="flex-1 bg-slate-100 flex flex-col p-6 overflow-y-auto no-print">
            <div class="flex-1 flex items-center justify-center py-4">
                
                <!-- A4 Paper Representation -->
                <div id="preview-wrapper" class="rounded-sm">
                    <div id="passport-print-area">
                        <!-- Empty State -->
                        <div class="w-full h-full flex flex-col items-center justify-center text-slate-400">
                            <div class="bg-slate-100 p-4 rounded-full mb-3">
                                <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                            <span class="font-medium text-sm">A4 Live Preview</span>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <!-- Application Script -->
    <script>
        let activeImageUrl = null;

        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const bgColorInput = document.getElementById('bgColor');
        const printArea = document.getElementById('passport-print-area');
        const loadingOverlay = document.getElementById('loading-overlay');
        const inputs = document.querySelectorAll('input[type="number"]');
        const sizePreset = document.getElementById('sizePreset');

        // Color Swatch function
        window.setColor = function(color) {
            bgColorInput.value = color;
            updatePreview();
        };

        // Preset sizes
        sizePreset.addEventListener('change', function(e) {
            if (e.target.value !== 'custom') {
                const [w, h, c, count] = e.target.value.split(',');
                document.getElementById('photoWidth').value = w;
                document.getElementById('photoHeight').value = h;
                document.getElementById('passportCols').value = c;
                document.getElementById('passportCount').value = count;
                updatePreview();
            }
        });

        // Event Listeners for file selection
        imageInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        // DRAG & DROP LOGIC
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-active');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Main Image Processor
        async function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            loadingOverlay.classList.remove('hidden');

            try {
                // Free In-Browser AI Background Removal
                const imageBlob = await imglyRemoveBackground(file, {
                    publicPath: 'https://unpkg.com/@imgly/background-removal@1.4.3/dist/assets/' 
                });
                
                if (activeImageUrl) URL.revokeObjectURL(activeImageUrl);
                activeImageUrl = URL.createObjectURL(imageBlob);
                
                updatePreview();
            } catch (error) {
                console.error("AI Error:", error);
                alert("Processing failed. Please try a different photo.");
            } finally {
                loadingOverlay.classList.add('hidden');
                imageInput.value = ""; // Reset input
            }
        }

        // Live Update Triggers
        inputs.forEach(input => input.addEventListener('input', () => {
            sizePreset.value = 'custom';
            updatePreview();
        }));
        bgColorInput.addEventListener('input', updatePreview);

        // Update HTML Preview
        function updatePreview() {
            if (!activeImageUrl) return;

            const w = document.getElementById('photoWidth').value;
            const h = document.getElementById('photoHeight').value;
            const c = document.getElementById('passportCols').value;
            const count = document.getElementById('passportCount').value;
            const top = document.getElementById('topMargin').value;
            const gap = document.getElementById('passportGap').value;
            const color = bgColorInput.value;

            printArea.style.setProperty('padding-top', `${top}mm`, 'important');
            printArea.style.setProperty('gap', `${gap}mm`, 'important');
            printArea.innerHTML = ''; 

            for (let i = 0; i < parseInt(count); i++) {
                const box = document.createElement('div');
                box.className = 'passport-img-box';
                box.style.width = `${w}mm`;
                box.style.height = `${h}mm`;
                box.style.backgroundColor = color;
                
                const img = document.createElement('img');
                img.src = activeImageUrl;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.objectPosition = 'center top'; // prioritize face

                box.appendChild(img);
                printArea.appendChild(box);
            }
        }

        const loadImage = (url) => new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => res(img);
            img.onerror = rej;
            img.src = url;
        });

        // High Res Canvas Download
        async function downloadPassportSheet() {
            if (!activeImageUrl) return alert("Please upload a photo first.");

            const btn = document.getElementById('downloadBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...`;
            btn.disabled = true;

            try {
                const w = parseFloat(document.getElementById('photoWidth').value);
                const h = parseFloat(document.getElementById('photoHeight').value);
                const cols = parseInt(document.getElementById('passportCols').value);
                const count = parseInt(document.getElementById('passportCount').value);
                const topM = parseFloat(document.getElementById('topMargin').value);
                const gap = parseFloat(document.getElementById('passportGap').value);
                const bgColor = bgColorInput.value;

                // 300 DPI Canvas Setup
                const canvas = document.createElement('canvas');
                canvas.width = 2480; 
                canvas.height = 3508;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const pxPerMm = 11.811;
                const padLeftPx = 12 * pxPerMm;
                const gapPx = gap * pxPerMm;
                const cwPx = w * pxPerMm;
                const chPx = h * pxPerMm;

                const img = await loadImage(activeImageUrl);
                let col = 0, row = 0;
                const startY = topM * pxPerMm;

                for (let i = 0; i < count; i++) {
                    if (col >= cols) { col = 0; row++; }
                    const x = padLeftPx + col * (cwPx + gapPx);
                    const y = startY + row * (chPx + gapPx);

                    // Background
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(x, y, cwPx, chPx);

                    // Image 'Cover' sizing logic
                    const imgAspect = img.width / img.height;
                    const canvasAspect = cwPx / chPx;
                    let dw, dh, ox, oy;

                    if (imgAspect > canvasAspect) {
                        dh = chPx; dw = img.width * (chPx / img.height);
                        ox = (cwPx - dw) / 2; oy = 0;
                    } else {
                        dw = cwPx; dh = img.height * (cwPx / img.width);
                        ox = 0; oy = 0; 
                    }

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, cwPx, chPx);
                    ctx.clip();
                    ctx.drawImage(img, x + ox, y + oy, dw, dh);
                    ctx.restore();

                    // Cut lines
                    ctx.strokeStyle = '#9ca3af';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([10, 10]);
                    ctx.strokeRect(x, y, cwPx, chPx);
                    ctx.setLineDash([]);

                    col++;
                }

                // Trigger Download
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Passport-Studio-${Date.now()}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/jpeg', 0.98);

            } catch (err) {
                console.error("Export Error:", err);
                alert("Error exporting image.");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
