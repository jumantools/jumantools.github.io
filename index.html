<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Passport Photo Maker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- AI Background Removal Library -->
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/imglyRemoveBackground.umd.js"></script>

    <style>
        /* --- PRINT CSS --- */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body * { visibility: hidden; }
            .no-print { display: none !important; }
            body { background: #ffffff !important; margin: 0 !important; padding: 0 !important; }
            #passport-print-area, #passport-print-area * { visibility: visible !important; }
            
            #passport-print-area {
                box-sizing: border-box !important;
                position: absolute !important; left: 0 !important; top: 0 !important;
                width: 210mm !important; height: 297mm !important; margin: 0 !important;
                padding-left: 12mm !important; padding-right: 12mm !important; padding-bottom: 12mm !important;
                background: #ffffff !important; display: flex !important;
                flex-wrap: wrap !important; align-content: flex-start !important;
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
            }
            .passport-img-box {
                box-sizing: border-box;
                border: 1px dashed #ccc;
            }
        }

        /* --- PREVIEW CSS --- */
        #preview-container {
            width: 100%; max-width: 500px; aspect-ratio: 210 / 297;
            background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden; position: relative; margin: 0 auto;
        }
        #passport-print-area {
            width: 100%; height: 100%; display: flex; flex-wrap: wrap;
            align-content: flex-start; box-sizing: border-box; padding: 4%;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans relative">

    <!-- Loading Overlay (Visible during AI Background Removal) -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-70 flex flex-col items-center justify-center z-50 hidden no-print">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <h2 class="text-white text-xl font-bold">Removing Background...</h2>
        <p class="text-gray-300 text-sm mt-2">First time takes a few seconds to load AI model.</p>
    </div>

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md no-print">
        <h1 class="text-2xl font-bold text-center">AI Passport Photo Generator</h1>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-4 grid grid-cols-1 lg:grid-cols-12 gap-8 no-print">
        
        <!-- Controls -->
        <div class="lg:col-span-5 bg-white p-6 rounded-lg shadow-md no-print">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">Settings</h2>
            
            <!-- Upload & Background Color -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="col-span-2">
                    <label class="block text-sm font-medium mb-1 text-blue-600">1. Upload Photo (Auto-removes background)</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full border p-2 rounded bg-gray-50">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium mb-1">2. Choose Background Color</label>
                    <div class="flex items-center space-x-2">
                        <input type="color" id="bgColor" value="#3b82f6" class="h-10 w-16 border rounded cursor-pointer">
                        <span class="text-sm text-gray-500">Pick any color for the passport background</span>
                    </div>
                </div>
            </div>

            <!-- Dimensions -->
            <div class="grid grid-cols-2 gap-4 mb-4 mt-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Width (mm)</label>
                    <input type="number" id="photoWidth" value="35" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Height (mm)</label>
                    <input type="number" id="photoHeight" value="45" class="w-full border p-2 rounded">
                </div>
            </div>

            <!-- Layout -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Columns</label>
                    <input type="number" id="passportCols" value="4" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Total Photos</label>
                    <input type="number" id="passportCount" value="8" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Top Margin (mm)</label>
                    <input type="number" id="topMargin" value="12" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Gap (mm)</label>
                    <input type="number" id="passportGap" value="5" class="w-full border p-2 rounded">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-6 space-y-3">
                <button onclick="window.print()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition">
                    🖨️ Print Directly (A4)
                </button>
                <button onclick="downloadPassportSheet()" id="downloadBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition">
                    ⬇️ Download High-Res (JPEG)
                </button>
            </div>
        </div>

        <!-- Preview -->
        <div class="lg:col-span-7 no-print">
            <div class="bg-gray-200 p-4 rounded-lg flex justify-center items-center h-full">
                <div id="preview-container">
                    <div id="passport-print-area">
                        <div class="w-full h-full flex items-center justify-center text-gray-400">
                            Upload a photo to see magic ✨
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- App Logic -->
    <script>
        let activeImageUrl = null;

        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const bgColorInput = document.getElementById('bgColor');
        const printArea = document.getElementById('passport-print-area');
        const loadingOverlay = document.getElementById('loading-overlay');
        const inputs = document.querySelectorAll('input[type="number"]');

        // 1. HANDLE IMAGE UPLOAD AND AI BACKGROUND REMOVAL
        imageInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show Loading Screen
            loadingOverlay.classList.remove('hidden');

            try {
                // Using @imgly to remove background (Runs locally in browser)
                const imageBlob = await imglyRemoveBackground(file, {
                    publicPath: 'https://unpkg.com/@imgly/background-removal@1.4.3/dist/assets/' // Required to load ML models
                });
                
                // Create URL from transparent image
                if (activeImageUrl) URL.revokeObjectURL(activeImageUrl);
                activeImageUrl = URL.createObjectURL(imageBlob);
                
                updatePreview();
            } catch (error) {
                console.error("Background Removal Error:", error);
                alert("Failed to remove background. Please try another image.");
            } finally {
                // Hide Loading Screen
                loadingOverlay.classList.add('hidden');
            }
        });

        // Update preview when Settings or Color change
        inputs.forEach(input => input.addEventListener('input', updatePreview));
        bgColorInput.addEventListener('input', updatePreview);

        function updatePreview() {
            if (!activeImageUrl) return;

            const widthStr = document.getElementById('photoWidth').value;
            const heightStr = document.getElementById('photoHeight').value;
            const colsStr = document.getElementById('passportCols').value;
            const countStr = document.getElementById('passportCount').value;
            const topMarginStr = document.getElementById('topMargin').value;
            const gapStr = document.getElementById('passportGap').value;
            const bgColor = bgColorInput.value;

            // Layout styling
            printArea.style.setProperty('padding-top', `${topMarginStr}mm`, 'important');
            printArea.style.setProperty('gap', `${gapStr}mm`, 'important');
            printArea.innerHTML = ''; 

            for (let i = 0; i < parseInt(countStr); i++) {
                const imgWrap = document.createElement('div');
                imgWrap.className = 'passport-img-box';
                imgWrap.style.width = `${widthStr}mm`;
                imgWrap.style.height = `${heightStr}mm`;
                imgWrap.style.backgroundColor = bgColor; // SET BACKGROUND COLOR
                
                const img = document.createElement('img');
                img.src = activeImageUrl;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';

                imgWrap.appendChild(img);
                printArea.appendChild(imgWrap);
            }
        }

        const loadImage = (url) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => resolve(img);
                img.onerror = (e) => reject(e);
                img.src = url;
            });
        };

        // Download High-Resolution Sheet
        async function downloadPassportSheet() {
            if (!activeImageUrl) {
                alert("Please upload a photo first.");
                return;
            }

            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Generating Sheet...";
            btn.disabled = true;

            try {
                const photoW = parseFloat(document.getElementById('photoWidth').value);
                const photoH = parseFloat(document.getElementById('photoHeight').value);
                const passportCols = parseInt(document.getElementById('passportCols').value);
                const passportCount = parseInt(document.getElementById('passportCount').value);
                const topMargin = parseFloat(document.getElementById('topMargin').value);
                const passportGap = parseFloat(document.getElementById('passportGap').value);
                const bgColor = bgColorInput.value;

                // 300 DPI Canvas
                const canvas = document.createElement('canvas');
                canvas.width = 2480; 
                canvas.height = 3508;
                const ctx = canvas.getContext('2d');
                
                // White A4 Sheet Background
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const pxPerMm = 11.811;
                const pagePaddingLeft = 12 * pxPerMm;
                const gapPx = passportGap * pxPerMm;
                const cardWidthPx = photoW * pxPerMm;
                const cardHeightPx = photoH * pxPerMm;

                const subjectImg = await loadImage(activeImageUrl);

                let col = 0; let row = 0;
                const startX = pagePaddingLeft;
                const startY = topMargin * pxPerMm;

                for (let i = 0; i < passportCount; i++) {
                    if (col >= passportCols) { col = 0; row++; }
                    
                    const x = startX + col * (cardWidthPx + gapPx);
                    const y = startY + row * (cardHeightPx + gapPx);

                    // 1. Draw User-Selected Background Color
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(x, y, cardWidthPx, cardHeightPx);

                    // 2. Draw Transparent User Photo on top
                    ctx.drawImage(subjectImg, x, y, cardWidthPx, cardHeightPx);

                    // 3. Draw Cut lines
                    ctx.strokeStyle = '#cccccc';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, cardWidthPx, cardHeightPx);

                    col++;
                }

                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'Passport-Photos-A4.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/jpeg', 1.0);

            } catch (error) {
                console.error("Export Error:", error);
                alert("Error generating the image. Check console for details.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
