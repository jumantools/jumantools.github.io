<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passport Size Photo Studio</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for Professional UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: '#2563eb', dark: '#0f172a' }
                }
            }
        }
    </script>
    
    <!-- Cropper.js for Interactive Cropping -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Imgly for Auto Background Removal -->
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/imglyRemoveBackground.umd.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* A4 LIVE PREVIEW CSS */
        #a4-preview-board {
            width: 100%; max-width: 450px; aspect-ratio: 210 / 297;
            background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: auto; display: flex; flex-wrap: wrap;
            align-content: flex-start; padding: 20px; gap: 10px; border: 1px solid #cbd5e1;
        }
        .photo-box {
            width: 35mm; height: 45mm; border: 1px dashed #94a3b8;
            overflow: hidden; background-color: #3b82f6; /* Default Blue BG */
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* EXACT A4 PRINT CSS */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body * { visibility: hidden; }
            .no-print { display: none !important; }
            body { background: #ffffff !important; margin: 0 !important; padding: 0 !important; }
            
            #a4-preview-board, #a4-preview-board * { visibility: visible !important; }
            #a4-preview-board {
                position: absolute !important; left: 0 !important; top: 0 !important;
                width: 210mm !important; height: 297mm !important; margin: 0 !important;
                padding: 15mm !important; gap: 5mm !important; box-shadow: none !important;
                border: none !important;
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800 overflow-hidden">

    <!-- 1. LOADING OVERLAY (For Background Removal) -->
    <div id="loadingOverlay" class="fixed inset-0 bg-dark/90 backdrop-blur-sm flex flex-col items-center justify-center z-[100] hidden no-print">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <h2 class="text-white text-2xl font-bold tracking-wide">Removing Background...</h2>
        <p class="text-slate-400 mt-2 text-sm">Please wait while AI processes the image.</p>
    </div>

    <!-- 2. CROPPER MODAL -->
    <div id="cropModal" class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-[90] hidden no-print p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h2 class="text-lg font-bold text-slate-800">Crop Face (35x45mm)</h2>
                <button onclick="closeCrop()" class="text-slate-500 hover:text-red-500 font-bold text-xl">&times;</button>
            </div>
            <div class="p-4 bg-slate-200 flex justify-center items-center" style="height: 400px;">
                <img id="cropImage" src="" style="max-width: 100%; max-height: 100%; display: block;">
            </div>
            <div class="p-4 border-t border-slate-200 flex justify-end gap-3 bg-white">
                <button onclick="closeCrop()" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50">Cancel</button>
                <button onclick="applyCropAndRemoveBg()" class="px-4 py-2 bg-brand text-white rounded-lg font-medium hover:bg-blue-700 shadow-md">Crop & Remove BG</button>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center px-6 shrink-0 no-print z-10 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-2xl">📸</span>
            <h1 class="text-xl font-bold text-dark tracking-tight">Passport Size Photo Studio</h1>
        </div>
    </header>

    <!-- MAIN DASHBOARD -->
    <main class="flex-1 flex overflow-hidden no-print">
        
        <!-- LEFT SIDEBAR: CONTROLS -->
        <aside class="w-full md:w-[400px] bg-white border-r border-slate-200 flex flex-col h-full shadow-lg z-10 overflow-y-auto">
            <div class="p-6 space-y-8 flex-1">
                
                <!-- Step 1: Upload -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Step 1: Upload Photo</h3>
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-brand transition group">
                        <span class="text-3xl mb-2 group-hover:scale-110 transition">📤</span>
                        <span class="text-sm font-semibold text-slate-600">Click to Upload Image</span>
                        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)" />
                    </label>
                </div>

                <!-- Step 2: Background Color -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Step 2: Background Color</h3>
                    <div class="flex gap-3 items-center">
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-300 focus:ring-2 focus:ring-brand" style="background: #3b82f6;" onclick="changeBgColor('#3b82f6')"></button>
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-300 focus:ring-2 focus:ring-brand" style="background: #ffffff;" onclick="changeBgColor('#ffffff')"></button>
                        <button class="w-10 h-10 rounded-full shadow-sm border border-slate-300 focus:ring-2 focus:ring-brand" style="background: #ef4444;" onclick="changeBgColor('#ef4444')"></button>
                        <span class="text-slate-300">|</span>
                        <input type="color" id="customBgColor" value="#3b82f6" class="w-10 h-10 border-0 rounded cursor-pointer" onchange="changeBgColor(this.value)">
                    </div>
                </div>

                <!-- Step 3: Photo Quantity (Dropdown + Plus/Minus) -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Step 3: Number of Photos</h3>
                    <div class="flex gap-3">
                        <!-- Dropdown -->
                        <select id="countDropdown" onchange="syncCount(this.value)" class="flex-1 bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-brand focus:border-brand p-2.5 font-medium outline-none shadow-sm">
                            <option value="2">2 Photos</option>
                            <option value="4">4 Photos</option>
                            <option value="6" selected>6 Photos (A4 Default)</option>
                            <option value="12">12 Photos</option>
                            <option value="24">24 Photos</option>
                            <option value="30">30 Photos (Full A4)</option>
                        </select>
                        
                        <!-- Plus/Minus Buttons -->
                        <div class="flex items-center border border-slate-300 rounded-lg shadow-sm overflow-hidden bg-white">
                            <button onclick="updateCount(-1)" class="w-10 h-full text-slate-600 hover:bg-slate-100 font-bold text-lg border-r border-slate-200 transition">-</button>
                            <input type="number" id="countInput" value="6" readonly class="w-12 h-full text-center font-bold text-slate-800 outline-none pointer-events-none p-0 border-0 text-sm">
                            <button onclick="updateCount(1)" class="w-10 h-full text-slate-600 hover:bg-slate-100 font-bold text-lg border-l border-slate-200 transition">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ACTION BUTTONS (Print & Download) -->
            <div class="p-6 border-t border-slate-200 bg-slate-50 space-y-3">
                <button onclick="downloadA4()" id="downloadBtn" class="w-full bg-brand hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download A4 (High-Res)
                </button>
                <button onclick="window.print()" class="w-full bg-white hover:bg-slate-100 text-slate-800 border border-slate-300 font-semibold py-3 px-4 rounded-xl shadow-sm transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Print Document
                </button>
            </div>
        </aside>

        <!-- RIGHT SIDE: A4 PREVIEW -->
        <section class="flex-1 bg-slate-200 flex flex-col p-8 overflow-y-auto no-print relative">
            <h2 class="text-center text-slate-500 font-semibold mb-4 text-sm uppercase tracking-widest">A4 Sheet Preview</h2>
            <div id="a4-preview-board">
                <!-- Javascript will inject photos here -->
            </div>
        </section>

    </main>

    <!-- CORE JAVA
